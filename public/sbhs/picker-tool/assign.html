<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>荷物の振り分け</title>
  <script>
      if (!Object.keys(localStorage).some(k => k.includes('CognitoIdentityServiceProvider') && k.includes('idToken'))) {
          window.location.replace('/');
      }
  </script>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Flatpickr CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="min-h-screen bg-slate-100 flex flex-col">
  <!-- オーバーレイ -->
  <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden transition-opacity"></div>

  <!-- ログアウト確認ダイアログ -->
  <div id="logout-dialog-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-[70] hidden transition-opacity"></div>
  <div id="logout-dialog" class="fixed inset-0 z-[70] hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-xl max-w-md w-full p-6 space-y-6">
      <h3 class="text-lg font-semibold text-gray-900 text-center">ログアウト確認</h3>
      <p class="text-gray-600 text-center">ログアウトしてもよろしいですか？</p>
      <div class="flex gap-4 justify-center">
        <button id="logout-cancel"
          class="px-6 py-2 text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors">
          キャンセル
        </button>
        <button id="logout-confirm"
          class="px-6 py-2 text-white bg-red-600 rounded-lg hover:bg-red-700 transition-colors">
          ログアウト
        </button>
      </div>
    </div>
  </div>

  <!-- 日付選択ダイアログ -->
  <div id="date-dialog-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-[60] hidden transition-opacity"></div>
  <div id="date-dialog" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-xl max-w-sm w-full p-6 space-y-4">
      <h3 class="text-lg font-semibold text-gray-900 text-center">日付を選択してください</h3>

      <!-- カレンダーコンテナ -->
      <div class="flex justify-center bg-slate-50 p-2 rounded-lg">
        <input type="text" id="inline-calendar" class="hidden">
      </div>

      <!-- 操作ボタン -->
      <div class="flex items-center justify-between gap-2">
        <button id="prev-day-btn"
          class="flex-1 px-3 py-2 text-indigo-600 bg-indigo-50 rounded-lg hover:bg-indigo-100 transition-colors flex items-center justify-center gap-1">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
            stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
          </svg>
          前日
        </button>
        <button id="today-btn"
          class="flex-1 px-3 py-2 text-indigo-600 bg-indigo-50 rounded-lg hover:bg-indigo-100 transition-colors flex items-center justify-center gap-1">
          今日
        </button>
        <button id="next-day-btn"
          class="flex-1 px-3 py-2 text-indigo-600 bg-indigo-50 rounded-lg hover:bg-indigo-100 transition-colors flex items-center justify-center gap-1">
          翌日
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
            stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </button>
      </div>

      <button id="date-confirm-btn"
        class="w-full px-4 py-2 text-white bg-indigo-600 rounded-lg hover:bg-indigo-700 transition-colors font-medium">
        決定
      </button>
    </div>
  </div>

  <!-- サイドバー -->
  <aside id="sidebar"
    class="fixed left-0 top-0 h-full w-64 sm:w-80 bg-white shadow-xl z-50 transform -translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
    <div class="p-4 border-b border-slate-200 flex items-center justify-between">
      <h2 class="text-lg font-semibold text-slate-900">メニュー</h2>
      <button id="sidebar-close" class="p-2 rounded-lg text-slate-600 hover:bg-slate-50 transition-colors"
        aria-label="閉じる">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"
          stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
    <nav class="p-4 flex flex-col flex-1">
      <!-- 日付選択 -->
      <div class="mb-4 relative">
        <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24"
            stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
        </div>
        <input type="date" id="target-date" name="target-date"
          class="w-full pl-3 pr-10 py-2 text-sm border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white" />
      </div>
      <ul class="space-y-2">
        <li>
          <a href="#" class="block px-4 py-2 text-slate-700 rounded-lg hover:bg-slate-50 transition-colors">振り分け者設定</a>
        </li>
        <li>
          <a href="#" class="block px-4 py-2 text-slate-700 rounded-lg hover:bg-slate-50 transition-colors">自動振り分け設定</a>
        </li>
      </ul>
      <ul class="space-y-2 border-t border-slate-200 pt-4 mt-auto">
        <li>
          <a href="#" id="logout-link"
            class="block px-4 py-2 text-red-600 rounded-lg hover:bg-red-50 transition-colors">ログアウト</a>
        </li>
        <li>
          <div class="block px-4 py-2 text-slate-700">TEST USER</div>
        </li>
      </ul>
    </nav>
  </aside>

  <header class="bg-white border-b border-slate-200 shadow-sm">
    <div class="w-full px-4 sm:px-6 h-16 sm:h-14 flex items-center gap-3">
      <div class="flex items-center">
        <button id="sidebar-toggle"
          class="p-2 rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-50 transition-colors"
          aria-label="サイドバー" aria-expanded="false">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"
            stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>
      <div class="flex-1 flex justify-center relative">
        <button id="title-dropdown-toggle"
          class="text-lg font-semibold text-slate-900 hover:text-indigo-600 transition-colors flex items-center gap-1">
          荷物割り当て
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
            stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
          </svg>
        </button>
        <div id="title-dropdown"
          class="hidden absolute top-full mt-2 bg-white rounded-lg shadow-lg border border-slate-200 min-w-[180px] z-50">
          <ul class="py-2">
            <li>
              <a href="manage.html" class="block px-4 py-2 text-slate-700 hover:bg-slate-50 transition-colors">
                ピッキング管理
              </a>
            </li>
            <li>
              <a href="picking.html" class="block px-4 py-2 text-slate-700 hover:bg-slate-50 transition-colors">
                ピッキング
              </a>
            </li>
          </ul>
        </div>
      </div>
      <div class="relative flex items-center gap-3">
        <button id="reload-button"
          class="p-2 rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-50 transition-colors"
          aria-label="リロード" title="リロード">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"
            stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
          </svg>
        </button>
        <button id="save-button"
          class="p-2 rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-50 transition-colors"
          aria-label="保存" title="保存">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"
            stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3-3m0 0l-3 3m3-3v12" />
          </svg>
        </button>
      </div>
    </div>
  </header>
  <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 py-8">
    <!-- 担当者荷物リスト（新規追加） -->
    <div id="assigner-package-list-wrapper"
      class="bg-white rounded-lg shadow border border-gray-200 overflow-hidden mb-6">
      <div class="px-6 py-4 border-b border-gray-200 bg-white relative flex items-center justify-center min-h-[60px]">
        <span id="assigner-name-display" class="absolute left-6 text-base font-medium text-gray-600"></span>
        <h2 class="text-xl font-bold text-gray-900">
          担当者荷物リスト
        </h2>
        <button id="toggle-assigner-list-btn"
          class="absolute right-6 text-gray-500 hover:text-gray-700 focus:outline-none transition-transform duration-200"
          title="展開/折りたたみ">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </button>
      </div>
      <div class="overflow-x-auto h-[12.5rem] overflow-y-auto" id="assigner-packages-scroll-container">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50 sticky top-0 z-10 shadow-sm">
            <tr>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                受注No.</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">商品名
              </th>
              <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">個数
              </th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                配送先</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">配送先住所
              </th>
            </tr>
          </thead>
          <tbody id="assigner-packages-list" class="bg-white divide-y divide-gray-200">
            <!-- JavaScriptでデータが挿入されます -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- 担当者リスト（権限3） -->
    <div class="bg-white rounded-lg shadow border border-gray-200 p-6 mb-6 text-center">
      <h2 class="text-xl font-bold text-gray-900 mb-4">担当者リスト</h2>
      <div id="assigner-list" class="flex flex-wrap gap-3">
        <!-- JavaScriptでボタンが挿入されます -->
        <div class="text-gray-400 text-sm">読み込み中...</div>
      </div>
    </div>

    <div class="bg-white rounded-lg shadow border border-gray-200 overflow-hidden">
      <!-- アコーディオンヘッダー -->
      <button id="package-list-toggle"
        class="w-full px-6 py-4 flex items-center justify-between bg-white hover:bg-gray-50 transition-colors focus:outline-none relative min-h-[64px]"
        aria-expanded="true">

        <!-- 左側：日付 -->
        <span id="list-header-date" class="text-lg font-medium text-gray-500 z-10"></span>

        <!-- 中央：タイトル -->
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
          <h1 class="text-xl font-bold text-gray-900">
            未割り当て荷物リスト
          </h1>
        </div>

        <!-- 右側：アイコン -->
        <svg id="package-list-icon" title="Toggle List" xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6 text-gray-400 transform transition-transform duration-200 rotate-180" fill="none"
          viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </button>

      <!-- アコーディオンコンテンツ -->
      <div id="package-list-container" class="transition-all duration-300 ease-in-out">
        <div class="overflow-x-auto border-t border-gray-200">
          <table class="min-w-full divide-y divide-gray-200" id="packages-table">
            <thead class="bg-gray-50">
              <tr>
                <th scope="col"
                  class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">
                  受注No.</th>
                <th scope="col"
                  class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">
                  商品名</th>
                <th scope="col"
                  class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">
                  個数</th>
                <th scope="col"
                  class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">
                  配送先</th>
                <th scope="col"
                  class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">
                  配送先住所</th>
              </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200" id="packages-list">
              <!-- JavaScriptでデータが挿入されます -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- Flatpickr JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <!-- Flatpickr Japanese locale -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>
  <!-- API Framework -->
  <script src="js/api/config.js"></script>
  <!-- Mock Data Injection -->
  <script src="data/packages.js"></script>
  <script src="data/users.js"></script>
  <script src="js/api/apiMock.js"></script>
  <script src="js/api/apiReal.js"></script>
  <script src="js/api/api.js"></script>
  <!-- Custom JavaScript -->
  <script src="js/main.js"></script>

  <footer class="mt-auto bg-white border-t border-slate-200">
    <div class="max-w-5xl mx-auto px-6 h-12 flex items-center justify-end text-sm text-slate-500">
      © TransSupporter
    </div>
  </footer>

</body>

</html>
