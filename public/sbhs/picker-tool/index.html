<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン</title>
    <script>
        if (!Object.keys(localStorage).some(k => k.includes('CognitoIdentityServiceProvider') && k.includes('idToken'))) {
            window.location.replace('/');
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-xl p-8 space-y-6">
            <!-- ヘッダー -->
            <div class="text-center space-y-2">
                <h1 class="text-3xl font-bold text-gray-900">ログイン</h1>
                <p class="text-gray-600">アカウントにログインしてください</p>
            </div>

            <!-- ログインフォーム -->
            <form class="space-y-5" id="login-form">
                <!-- ユーザー名/メールアドレス -->
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
                        ユーザー名
                    </label>
                    <input type="text" id="username" name="username"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all"
                        placeholder="ユーザー名を入力">
                </div>

                <!-- パスワード -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                        パスワード
                    </label>
                    <input type="password" id="password" name="password"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all"
                        placeholder="パスワードを入力">
                </div>

                <!-- ログインボタン -->
                <button type="submit"
                    class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition-colors">
                    ログイン (管理者/割り当て担当)
                </button>

                <!-- 開発用：高橋さんログイン -->
                <button type="button" id="login-takahashi-btn"
                    class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 transition-colors mt-4">
                    高橋さんでログイン (ピッキング担当)
                </button>
            </form>

            <!-- フッター -->
            <div class="text-center text-sm text-gray-600">
                <a href="/sbhs" class="inline-block w-full bg-gray-200 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-300 transition-colors">ホームに戻る</a>
                <p class="mt-3">© TransSupporter</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            window.location.href = 'assign.html';
        });

        document.getElementById('login-takahashi-btn').addEventListener('click', function () {
            sessionStorage.setItem('accessToken', "1000000003");
            window.location.href = 'picking.html';
        });
    </script>
</body>

</html>
