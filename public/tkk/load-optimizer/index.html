<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>積載最適化システム</title>
    <script>
        if (!Object.keys(localStorage).some(k => k.includes('CognitoIdentityServiceProvider') && k.includes('idToken'))) {
            window.location.replace('/');
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary: #64748b;
            --success: #10b981;
            --danger: #f43f5e;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 12px;
            --shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.05);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 1040px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.875rem;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .panel:hover {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05);
        }

        .panel-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #1e293b;
        }

        .grid-settings {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.813rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.025em;
        }

        input,
        select {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.938rem;
            color: var(--text-main);
            background-color: #ffffff;
            transition: var(--transition);
            width: 100%;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        input.error {
            border-color: var(--danger);
            background-color: #fff1f2;
        }

        .btn {
            cursor: pointer;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.938rem;
            border: none;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        .btn-secondary {
            background-color: #f1f5f9;
            color: #475569;
        }

        .btn-secondary:hover {
            background-color: #e2e8f0;
            color: #1e293b;
        }

        /* Product List Styling */
        .add-product-bar {
            background: #f8fafc;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 24px;
            display: flex;
            align-items: flex-end;
            gap: 16px;
            border: 1px dashed #cbd5e1;
        }

        .product-container {
            margin-top: 10px;
        }

        .product-header {
            display: grid;
            grid-template-columns: 160px 85px 85px 100px 100px 100px 40px;
            gap: 12px;
            padding: 0 16px 12px 16px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 2px solid var(--bg);
        }

        .product-row {
            display: grid;
            grid-template-columns: 160px 85px 85px 100px 100px 100px 40px;
            gap: 12px;
            padding: 16px;
            align-items: center;
            border-bottom: 1px solid var(--bg);
            transition: var(--transition);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .product-row:hover {
            background-color: #fcfcfd;
        }

        .p-name-label {
            font-weight: 700;
            font-size: 0.938rem;
            color: #1e293b;
        }

        .p-input-readonly {
            background: transparent;
            border: none;
            padding: 0;
            font-weight: 700;
            pointer-events: none;
        }

        .remove-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            transition: var(--transition);
            border: 1px solid transparent;
            background: transparent;
            cursor: pointer;
        }

        .remove-btn:hover {
            color: var(--danger);
            background: #fff1f2;
            border-color: #fee2e2;
        }

        /* Results Styling */
        .result-car {
            margin-top: 24px;
            padding: 24px;
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .result-stats {
            display: flex;
            gap: 24px;
            margin-bottom: 20px;
            padding: 12px 16px;
            background: #f8fafc;
            border-radius: 8px;
            font-size: 0.875rem;
        }

        .result-stats span {
            color: var(--text-muted);
        }

        .result-stats strong {
            color: var(--primary);
            font-size: 1.1rem;
        }

        .result-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        .result-table th {
            text-align: left;
            font-size: 0.75rem;
            color: var(--text-muted);
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .result-table td {
            padding: 12px;
            border-bottom: 1px solid #f8fafc;
            font-size: 0.875rem;
        }

        .hidden {
            display: none;
        }

        #error-message {
            color: white;
            padding: 12px 16px;
            background: var(--danger);
            border-radius: 8px;
            margin-top: 16px;
            font-size: 0.875rem;
            display: none;
        }

        /* Truck Preview Styling */
        .truck-viz {
            position: relative;
            background: #f1f5f9;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            margin: 20px 0;
            overflow: hidden;
            background-image:
                linear-gradient(rgba(203, 213, 225, 0.4) 1px, transparent 1px),
                linear-gradient(90deg, rgba(203, 213, 225, 0.4) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .truck-viz-label {
            position: absolute;
            top: 5px;
            left: 10px;
            font-size: 0.75rem;
            color: #64748b;
            font-weight: 700;
            text-transform: uppercase;
        }

        .bundle-block {
            position: absolute;
            border: 1px solid rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            color: white;
            border-radius: 2px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
            cursor: pointer;
            overflow: hidden;
            white-space: nowrap;
        }

        .bundle-block:hover {
            transform: scale(1.02);
            z-index: 10;
        }

        .viz-legend {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.813rem;
            color: var(--text-muted);
        }

        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <div style="font-size: 2.2rem;">🏗️</div>
            <h1>積載最適化システム</h1>
        </header>

        <!-- Vehicle Settings -->
        <div class="panel">
            <div class="panel-title">🚚 車両コンフィギュレーション</div>
            <div class="grid-settings">
                <div class="input-group">
                    <label>プリセット</label>
                    <select id="v-type" onchange="updateVehiclePreset()">
                        <option value="4t" selected>4トン車 (標準)</option>
                        <option value="10t">10トン車 (大型)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>最大積載重量 (kg)</label>
                    <input type="number" id="v-weight" value="4000">
                </div>
                <div class="input-group">
                    <label>荷台横幅 (m)</label>
                    <input type="number" id="v-width" value="2.3" step="0.1">
                </div>
                <div class="input-group">
                    <label>高さ制限 (m)</label>
                    <input type="number" id="v-height" value="0.6" step="0.1">
                </div>
            </div>
        </div>

        <!-- Product Input -->
        <div class="panel">
            <div class="panel-title">📦 出荷製品リスト</div>

            <div class="add-product-bar">
                <div class="input-group" style="flex: 2;">
                    <label>製品を選択</label>
                    <select id="p-selector" style="font-family: inherit;">
                        <option value="SGP 15A">SGP 15A - 外径21.7mm 重量1.31kg/m</option>
                        <option value="SGP 25A">SGP 25A - 外径34.0mm 重量2.43kg/m</option>
                        <option value="SGP 50A">SGP 50A - 外径60.5mm 重量5.31kg/m</option>
                        <option value="SGP 100A">SGP 100A - 外径114.3mm 重量12.2kg/m</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>長さ(m)</label>
                    <input type="number" id="p-initial-len" value="6.0" step="0.1" style="width: 80px;">
                </div>
                <div class="input-group">
                    <label>本数</label>
                    <input type="number" id="p-initial-count" value="10" style="width: 80px;">
                </div>
                <button class="btn btn-secondary" onclick="addProductRowFromUI()">+ リストに追加</button>
            </div>

            <div id="product-container" class="product-container">
                <div class="product-header">
                    <div>製品名</div>
                    <div>長さ(m)</div>
                    <div>本数</div>
                    <div>重量(kg)</div>
                    <div>横幅(m)</div>
                    <div>高さ(m)</div>
                    <div></div>
                </div>
                <!-- Rows will be added dynamically -->
            </div>

            <div id="error-message">❌ 入力内容にエラーがあります。赤枠の項目を修正してください。</div>
            <button class="btn btn-primary" style="margin-top: 32px; width: 100%; font-size: 1.1rem;"
                onclick="runOptimization()">
                計算を実行
            </button>
        </div>

        <!-- Results Area -->
        <div id="result-area" class="panel hidden" style="background: #fdfdfe;">
            <div class="panel-title" style="color: var(--primary);">📊 最適化結果レポート</div>
            <div id="result-list"></div>
        </div>
    </div>

    <script src="logic.js"></script>
    <script>
        function updateVehiclePreset() {
            const type = document.getElementById('v-type').value;
            const weightEl = document.getElementById('v-weight');
            const heightEl = document.getElementById('v-height');
            const widthEl = document.getElementById('v-width');

            if (type === '4t') {
                weightEl.value = 4000;
                heightEl.value = 0.6;
                widthEl.value = 2.3;
            } else if (type === '10t') {
                weightEl.value = 10000;
                heightEl.value = 0.8;
                widthEl.value = 2.3;
            }
        }

        function addProductRowFromUI() {
            const selectedName = document.getElementById('p-selector').value;
            const initialLen = parseFloat(document.getElementById('p-initial-len').value) || 6.0;
            const initialCount = parseInt(document.getElementById('p-initial-count').value) || 1;
            const product = PRODUCT_TYPES.find(p => p.name === selectedName);
            addProductRow(product, initialCount, initialLen);
        }

        function addProductRow(product, count, len) {
            const container = document.getElementById('product-container');
            const row = document.createElement('div');
            row.className = 'product-row';

            // Initial dimensions calculation based on Chidori
            const dims = calculateChidori(product, count, len);

            row.innerHTML = `
            <div class="p-name-label">${product.name}</div>
            <div>
                <input type="number" class="p-len" value="${len}" step="0.1" oninput="updateRowCalcs(this)">
            </div>
            <div>
                <input type="number" class="p-count" value="${count}" step="1" oninput="updateRowCalcs(this)">
            </div>
            <div>
                <input type="number" class="p-weight" value="${dims.weight}" step="0.1" data-kgm="${product.kgm}">
            </div>
            <div>
                <input type="number" class="p-width" value="${dims.width}" step="0.01">
            </div>
            <div>
                <input type="number" class="p-height" value="${dims.height}" step="0.01">
            </div>
            <button class="remove-btn" onclick="this.parentElement.remove()">
                <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                </svg>
            </button>
        `;
            container.appendChild(row);
        }

        function updateRowCalcs(el) {
            const row = el.closest('.product-row');
            const name = row.querySelector('.p-name-label').innerText;
            const product = PRODUCT_TYPES.find(p => p.name === name);
            const len = parseFloat(row.querySelector('.p-len').value) || 0;
            const count = parseInt(row.querySelector('.p-count').value) || 0;

            const dims = calculateChidori(product, count, len);

            row.querySelector('.p-weight').value = dims.weight;
            row.querySelector('.p-width').value = dims.width;
            row.querySelector('.p-height').value = dims.height;
        }

        function runOptimization() {
            const rows = document.querySelectorAll('.product-row');
            const errEl = document.getElementById('error-message');
            errEl.style.display = 'none';

            let hasError = false;
            const inputData = [];

            // Validation
            rows.forEach(row => {
                const name = row.querySelector('.p-name-label').innerText;
                const weightEl = row.querySelector('.p-weight');
                const widthEl = row.querySelector('.p-width');
                const heightEl = row.querySelector('.p-height');

                const weight = parseFloat(weightEl.value);
                const width = parseFloat(widthEl.value);
                const height = parseFloat(heightEl.value);

                [weightEl, widthEl, heightEl].forEach(el => el.classList.remove('error'));

                if (isNaN(weight) || weight <= 0) {
                    weightEl.classList.add('error');
                    hasError = true;
                }
                if (isNaN(width) || width <= 0) {
                    widthEl.classList.add('error');
                    hasError = true;
                }
                if (isNaN(height) || height <= 0) {
                    heightEl.classList.add('error');
                    hasError = true;
                }

                if (!hasError) {
                    inputData.push({
                        name,
                        weight,
                        bundleWidth: width,
                        bundleHeight: height,
                        od: PRODUCT_TYPES.find(p => p.name === name).od
                    });
                }
            });

            if (rows.length === 0) return;
            if (hasError) {
                errEl.style.display = 'block';
                return;
            }

            // Vehicle constraints
            const maxWeight = parseFloat(document.getElementById('v-weight').value);
            const maxWidth = parseFloat(document.getElementById('v-width').value);
            const maxHeight = parseFloat(document.getElementById('v-height').value);

            // Algorithm: Calculate Trucks
            const trucks = calculateAllocation(inputData, maxWeight, maxWidth, maxHeight);
            displayResults(trucks);
        }

        function displayResults(trucks) {
            const area = document.getElementById('result-area');
            const list = document.getElementById('result-list');
            area.classList.remove('hidden');
            list.innerHTML = '';

            const maxWidth = parseFloat(document.getElementById('v-width').value);
            const maxHeight = parseFloat(document.getElementById('v-height').value);

            // 1. Add Legend
            const legend = document.createElement('div');
            legend.className = 'viz-legend';
            PRODUCT_TYPES.forEach(p => {
                legend.innerHTML += `
                    <div class="legend-item">
                        <div class="legend-color" style="background:${p.color}"></div>
                        <span>${p.name}</span>
                    </div>
                `;
            });
            list.appendChild(legend);

            // 2. Render each truck
            trucks.forEach((truck, index) => {
                const carDiv = document.createElement('div');
                carDiv.className = 'result-car';

                const rowsHtml = truck.bundles.map(b => `
                    <tr>
                        <td style="font-weight:600;">${b.name}</td>
                        <td>${b.weight} kg</td>
                        <td>${b.bundleWidth} m</td>
                        <td>${b.bundleHeight} m</td>
                    </tr>
                `).join('');

                // Visual Scaling
                const scale = 300;
                const vizWidth = maxWidth * scale;
                const vizHeight = maxHeight * scale;

                const bundlesHtml = truck.bundles.map(b => {
                    const prod = PRODUCT_TYPES.find(p => p.name === b.name);
                    const left = b.x * scale;
                    const bottom = b.y * scale;
                    const w = (b.displayWidth || b.bundleWidth) * scale;
                    const h = b.bundleHeight * scale;
                    return `
                        <div class="bundle-block" style="
                            left: ${left}px;
                            bottom: ${bottom}px;
                            width: ${w - 2}px;
                            height: ${h - 2}px;
                            background: ${prod.color};
                            padding: 4px;
                        " title="${b.name}: ${b.weight}kg">
                            ${b.name.replace('SGP ', '')}
                        </div>
                    `;
                }).join('');

                carDiv.innerHTML = `
                <div class="panel-title" style="color: var(--primary);">🚚 配車 #${index + 1}</div>
                <div class="result-stats">
                    <div>積載重量: <strong>${truck.totalWeight} kg</strong> <span style="font-size: 0.8rem; margin-left:4px;">(${truck.loadFactor}%)</span></div>
                    <div style="margin-left:auto;">荷姿概寸: <strong>横 ${truck.totalWidth}m / 高 ${truck.totalHeight}m</strong></div>
                </div>

                <div class="truck-viz" style="width: ${vizWidth}px; height: ${vizHeight}px;">
                    <div class="truck-viz-label">荷台見取り図 (幅${maxWidth}m × 高${maxHeight}m)</div>
                    ${bundlesHtml}
                </div>

                <table class="result-table">
                    <thead>
                        <tr>
                            <th>製品名</th>
                            <th>重量</th>
                            <th>幅</th>
                            <th>高さ</th>
                        </tr>
                    </thead>
                    <tbody>${rowsHtml}</tbody>
                </table>
                `;
                list.appendChild(carDiv);
            });

            area.scrollIntoView({ behavior: 'smooth' });
        }
    </script>

</body>

</html>
